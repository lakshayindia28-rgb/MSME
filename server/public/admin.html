<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrediVerify 360 — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --primary:#1e40af;--primary-light:#3b82f6;--primary-dark:#1e3a8a;
      --accent:#0ea5e9;--surface:#ffffff;--bg:#f0f4f8;
      --ink:#0f172a;--ink2:#334155;--ink3:#64748b;
      --border:#e2e8f0;--radius:14px;
      --danger:#dc2626;--danger-light:#fef2f2;
      --success:#059669;--success-light:#ecfdf5;
    }
    html{height:100%}
    body{
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      min-height:100vh;background:var(--bg);color:var(--ink);
    }

    /* ── Top Bar ── */
    .topbar{
      background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 100%);
      padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15);
    }
    .topbar-left{display:flex;align-items:center;gap:16px}
    .topbar-logo{
      width:38px;height:38px;border-radius:10px;
      background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:800;color:#fff;border:1px solid rgba(255,255,255,.15);
    }
    .topbar-title{font-size:1.1rem;font-weight:700;color:#fff;letter-spacing:-.02em}
    .topbar-badge{
      background:rgba(59,130,246,.2);color:#93c5fd;font-size:.7rem;font-weight:700;
      padding:3px 10px;border-radius:20px;letter-spacing:.03em;
    }
    .topbar-right{display:flex;align-items:center;gap:12px}
    .topbar-btn{
      padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:600;
      cursor:pointer;font-family:inherit;border:none;transition:all .15s;
      text-decoration:none;display:inline-flex;align-items:center;gap:6px;
    }
    .topbar-btn.secondary{background:rgba(255,255,255,.1);color:#e2e8f0}
    .topbar-btn.secondary:hover{background:rgba(255,255,255,.2)}
    .topbar-btn.danger{background:rgba(220,38,38,.2);color:#fca5a5}
    .topbar-btn.danger:hover{background:rgba(220,38,38,.3)}

    /* ── Main Container ── */
    .main{max-width:900px;margin:0 auto;padding:32px 24px}

    .page-title{font-size:1.6rem;font-weight:800;color:var(--ink);margin-bottom:4px;letter-spacing:-.02em}
    .page-desc{font-size:.9rem;color:var(--ink3);margin-bottom:28px}

    /* ── Card ── */
    .card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:24px;margin-bottom:24px;
      box-shadow:0 1px 4px rgba(0,0,0,.04);
    }
    .card-title{font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .card-title .icon{font-size:1.2rem}

    /* ── Create User Form ── */
    .form-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
    .form-group{flex:1;min-width:180px}
    .form-label{
      display:block;font-size:.78rem;font-weight:600;color:var(--ink2);
      margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;
    }
    .form-input{
      width:100%;padding:10px 14px;border:1.5px solid var(--border);
      border-radius:10px;font-size:.9rem;font-family:inherit;color:var(--ink);
      background:var(--bg);transition:border-color .2s,box-shadow .2s;outline:none;
    }
    .form-input:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
    .btn{
      padding:10px 20px;border:none;border-radius:10px;font-size:.85rem;font-weight:700;
      cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;
      align-items:center;gap:6px;white-space:nowrap;
    }
    .btn-primary{
      background:linear-gradient(135deg,var(--primary),var(--primary-light));
      color:#fff;box-shadow:0 2px 8px rgba(30,64,175,.25);
    }
    .btn-primary:hover{box-shadow:0 4px 14px rgba(30,64,175,.35);transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .btn-danger-sm{
      padding:6px 12px;border:none;border-radius:8px;font-size:.75rem;font-weight:600;
      cursor:pointer;font-family:inherit;background:var(--danger-light);color:var(--danger);
      transition:all .15s;
    }
    .btn-danger-sm:hover{background:#fee2e2}

    /* ── Message ── */
    .msg{
      padding:10px 14px;border-radius:10px;font-size:.85rem;font-weight:500;
      margin-bottom:16px;display:none;
    }
    .msg.show{display:block;animation:fadeIn .3s ease}
    .msg.error{background:var(--danger-light);border:1px solid #fecaca;color:#991b1b}
    .msg.success{background:var(--success-light);border:1px solid #a7f3d0;color:#065f46}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

    /* ── Users Table ── */
    .users-table{width:100%;border-collapse:collapse;font-size:.88rem}
    .users-table th{
      text-align:left;padding:10px 14px;font-size:.75rem;font-weight:700;
      text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);
      background:var(--bg);border-bottom:2px solid var(--border);
    }
    .users-table td{
      padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle;
    }
    .users-table tr:last-child td{border-bottom:none}
    .users-table tr:hover td{background:#f8fafc}
    .role-badge{
      display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;
      font-weight:700;letter-spacing:.02em;
    }
    .role-badge.admin{background:#dbeafe;color:#1e40af}
    .role-badge.user{background:#f0fdf4;color:#15803d}
    .empty-row{text-align:center;color:var(--ink3);padding:24px 14px !important;font-style:italic}

    /* ── Loading spinner ── */
    .spinner{
      display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;animation:spin .5s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Responsive ── */
    @media(max-width:640px){
      .topbar{padding:0 16px;height:56px}
      .main{padding:20px 16px}
      .form-row{flex-direction:column}
      .form-group{min-width:unset}
      .topbar-badge{display:none}
    }
  </style>
</head>
<body>
  <!-- ── Top Bar ── -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">CV</div>
      <span class="topbar-title">CrediVerify 360</span>
      <span class="topbar-badge">ADMIN</span>
    </div>
    <div class="topbar-right">
      <a href="/dashboard" class="topbar-btn secondary">📊 Dashboard</a>
      <button class="topbar-btn danger" id="logoutBtn">⏻ Logout</button>
    </div>
  </div>

  <!-- ── Main ── -->
  <div class="main">
    <h1 class="page-title">Manage Users</h1>
    <p class="page-desc">Create and manage user accounts for the CrediVerify 360 platform.</p>

    <!-- Change Password -->
    <div class="card">
      <div class="card-title"><span class="icon">🔑</span> Change Your Password</div>
      <div class="msg" id="cpMsg"></div>
      <form id="cpForm" autocomplete="off">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="cpCurrent">Current Password</label>
            <input class="form-input" id="cpCurrent" type="password" placeholder="Current password" required autocomplete="current-password" />
          </div>
          <div class="form-group">
            <label class="form-label" for="cpNew">New Password</label>
            <input class="form-input" id="cpNew" type="password" placeholder="Min 3 characters" required minlength="3" autocomplete="new-password" />
          </div>
          <div style="flex-shrink:0">
            <button class="btn btn-primary" type="submit" id="cpBtn">
              <span class="btn-text">Change Password</span>
            </button>
          </div>
        </div>
      </form>
    </div>

    <!-- Create User -->
    <div class="card">
      <div class="card-title"><span class="icon">➕</span> Create New User</div>
      <div class="msg" id="createMsg"></div>
      <form id="createForm" autocomplete="off">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="newUsername">Username</label>
            <input class="form-input" id="newUsername" type="text" placeholder="e.g. john_doe" required minlength="2" maxlength="30" autocomplete="off" />
          </div>
          <div class="form-group">
            <label class="form-label" for="newPassword">Password</label>
            <input class="form-input" id="newPassword" type="password" placeholder="Min 3 characters" required minlength="3" autocomplete="new-password" />
          </div>
          <div style="flex-shrink:0">
            <button class="btn btn-primary" type="submit" id="createBtn">
              <span class="btn-text">Create User</span>
            </button>
          </div>
        </div>
      </form>
    </div>

    <!-- Users List -->
    <div class="card">
      <div class="card-title"><span class="icon">👥</span> All Users</div>
      <div class="msg" id="listMsg"></div>
      <div id="usersTableWrap">
        <table class="users-table">
          <thead>
            <tr><th>Username</th><th>Role</th><th>Created</th><th>Created By</th><th></th></tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="5" class="empty-row">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
  (function() {
    const SESSION_KEY = 'cv360:auth:session';
    const TOKEN_KEY = 'cv360:auth:token';

    // ── Session guard: admin only ──
    function getSession() {
      try {
        const raw = sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    const session = getSession();
    if (!session || !session.userId) {
      window.location.replace('/');
      return;
    }

    const token = localStorage.getItem(TOKEN_KEY) || '';

    function authHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      };
    }

    // ── Elements ──
    const createForm = document.getElementById('createForm');
    const createMsg = document.getElementById('createMsg');
    const createBtn = document.getElementById('createBtn');
    const usersBody = document.getElementById('usersBody');
    const listMsg = document.getElementById('listMsg');

    function showMsg(el, text, type) {
      el.textContent = text;
      el.className = 'msg show ' + type;
      setTimeout(() => { el.classList.remove('show'); }, 4000);
    }

    // ── Load Users ──
    async function loadUsers() {
      try {
        const resp = await fetch('/api/admin/users', { headers: authHeaders() });
        if (resp.status === 403) {
          // Token expired or invalid — redirect to login
          sessionStorage.removeItem(SESSION_KEY);
          localStorage.removeItem(SESSION_KEY);
          localStorage.removeItem(TOKEN_KEY);
          window.location.replace('/');
          return;
        }
        const data = await resp.json();
        if (!data.success) {
          usersBody.innerHTML = '<tr><td colspan="5" class="empty-row">Failed to load users</td></tr>';
          return;
        }
        renderUsers(data.users);
      } catch {
        usersBody.innerHTML = '<tr><td colspan="5" class="empty-row">Network error</td></tr>';
      }
    }

    function renderUsers(users) {
      if (!users.length) {
        usersBody.innerHTML = '<tr><td colspan="5" class="empty-row">No users found</td></tr>';
        return;
      }
      usersBody.innerHTML = users.map(u => {
        const dateStr = u.createdAt ? new Date(u.createdAt).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : '—';
        const isAdmin = u.role === 'admin';
        const isSelf = u.username === session.userId;
        return `<tr>
          <td><strong>${esc(u.username)}</strong></td>
          <td><span class="role-badge ${u.role}">${u.role === 'admin' ? 'Admin' : 'User'}</span></td>
          <td style="color:var(--ink3);font-size:.82rem">${dateStr}</td>
          <td style="color:var(--ink3);font-size:.82rem">${esc(u.createdBy || '—')}</td>
          <td style="text-align:right">
            ${isSelf ? '<span style="font-size:.75rem;color:var(--ink3)">You</span>' :
              `<button class="btn-danger-sm" data-delete="${esc(u.username)}">Delete</button>`}
          </td>
        </tr>`;
      }).join('');

      // Attach delete handlers
      usersBody.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', () => deleteUser(btn.dataset.delete));
      });
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    // ── Create User ──
    createForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value;
      if (!username || !password) return;

      createBtn.disabled = true;
      createBtn.innerHTML = '<div class="spinner"></div>';

      try {
        const resp = await fetch('/api/admin/users', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ username, password })
        });
        const data = await resp.json();
        createBtn.disabled = false;
        createBtn.innerHTML = '<span class="btn-text">Create User</span>';

        if (!resp.ok || !data.success) {
          showMsg(createMsg, data.error || 'Failed to create user', 'error');
          return;
        }

        showMsg(createMsg, `User "${username}" created successfully!`, 'success');
        createForm.reset();
        loadUsers();
      } catch {
        createBtn.disabled = false;
        createBtn.innerHTML = '<span class="btn-text">Create User</span>';
        showMsg(createMsg, 'Network error', 'error');
      }
    });

    // ── Delete User ──
    async function deleteUser(username) {
      if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;

      try {
        const resp = await fetch('/api/admin/users/' + encodeURIComponent(username), {
          method: 'DELETE',
          headers: authHeaders()
        });
        const data = await resp.json();
        if (!resp.ok || !data.success) {
          showMsg(listMsg, data.error || 'Failed to delete user', 'error');
          return;
        }
        showMsg(listMsg, `User "${username}" deleted.`, 'success');
        loadUsers();
      } catch {
        showMsg(listMsg, 'Network error', 'error');
      }
    }

    // ── Logout ──
    document.getElementById('logoutBtn').addEventListener('click', () => {
      // Invalidate server session
      fetch('/api/auth/logout', { method: 'POST', headers: authHeaders() }).catch(() => {});
      sessionStorage.removeItem(SESSION_KEY);
      localStorage.removeItem(SESSION_KEY);
      localStorage.removeItem(TOKEN_KEY);
      window.location.replace('/');
    });

    // ── Change Password ──
    document.getElementById('cpForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const currentPassword = document.getElementById('cpCurrent').value;
      const newPassword = document.getElementById('cpNew').value;
      if (!currentPassword || !newPassword) return;
      const cpBtn = document.getElementById('cpBtn');
      cpBtn.disabled = true;
      cpBtn.innerHTML = '<div class="spinner"></div>';
      try {
        const resp = await fetch('/api/auth/change-password', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ currentPassword, newPassword })
        });
        const data = await resp.json();
        cpBtn.disabled = false;
        cpBtn.innerHTML = '<span class="btn-text">Change Password</span>';
        if (!resp.ok || !data.success) {
          showMsg(document.getElementById('cpMsg'), data.error || 'Failed to change password', 'error');
          return;
        }
        showMsg(document.getElementById('cpMsg'), 'Password changed successfully!', 'success');
        document.getElementById('cpForm').reset();
      } catch {
        cpBtn.disabled = false;
        cpBtn.innerHTML = '<span class="btn-text">Change Password</span>';
        showMsg(document.getElementById('cpMsg'), 'Network error', 'error');
      }
    });

    // ── Init ──
    loadUsers();
  })();
  </script>
</body>
</html>
